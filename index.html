<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer X</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌌 BACKGROUND -->
<canvas id="bg"></canvas>

<header>
    <div class="logo">Developer X</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <nav id="nav">
        <a onclick="showTab('home', this)" class="active">Home</a>
        <a onclick="showTab('about', this)">About</a>
        <a onclick="showTab('skills', this)">Skills</a>
        <a onclick="showTab('portfolio', this)">Portfolio</a>
        <a onclick="showTab('contact', this)">Contact</a>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="tab active hero">
    <div class="left">
        <h1>I'm Aditya,<br><span id="typing"></span></h1>
        <p>I build modern animated websites.</p>
        <button onclick="showTab('portfolio', this)">View Work</button>
    </div>

    <div class="center">
        <img src="aditya.png" alt="profile">
    </div>
</section>

<!-- ABOUT -->
<section id="about" class="tab">
    <h1>About Me</h1>
    <p>I am a creative web developer who builds responsive and modern UI.</p>
</section>

<!-- SKILLS -->
<section id="skills" class="tab">
    <h1>My Skills</h1>

    <div class="skill">
        <p>HTML</p>
        <div class="bar"><div style="width:90%"></div></div>
    </div>

    <div class="skill">
        <p>CSS</p>
        <div class="bar"><div style="width:85%"></div></div>
    </div>

    <div class="skill">
        <p>JavaScript</p>
        <div class="bar"><div style="width:75%"></div></div>
    </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="tab">
    <h1>Projects</h1>

    <div class="cards">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="tab">
    <h1>Contact Me</h1>
    <p>Email: your@email.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
